name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        shell: pwsh
        run: |
          if (Test-Path "package-lock.json") {
            npm ci
          } else {
            npm install
          }

      - name: Build app
        run: npm run build

      - name: Locate SkyAutoPiano.exe
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Filter "SkyAutoPiano.exe" | Select-Object -ExpandProperty FullName

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: iscc "src\installer\x64.iss"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SkyAutoPiano-installer
          path: Output/*.exe
